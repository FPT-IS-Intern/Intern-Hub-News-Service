name: Docker Build & Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'infra/**'
      - 'core/**'
      - 'app/**'
      - 'gradle/libs.versions.toml'
      - 'build.gradle.kts'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build bootJar
        run: ./gradlew :app:bootJar --no-daemon

      - name: Build custom JRE with jlink
        run: |
          jdeps --ignore-missing-deps -q \
            --recursive \
            --multi-release 25 \
            --print-module-deps \
            --class-path 'app/build/libs/*' \
            app/build/libs/news-service.jar > deps.txt

          jlink \
            --add-modules $(cat deps.txt),java.base,java.logging,java.naming,java.desktop,java.management,java.security.jgss,java.instrument,java.sql,java.compiler,jdk.crypto.ec,jdk.unsupported \
            --compress zip-9 \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --output custom-jre

      - name: Download OpenTelemetry agent
        run: |
          mkdir -p otel
          wget -q -O otel/opentelemetry-javaagent.jar \
            https://repo1.maven.org/maven2/io/opentelemetry/javaagent/opentelemetry-javaagent/2.25.0/opentelemetry-javaagent-2.25.0.jar

      - name: Stage extra directories for Jib
        run: |
          mkdir -p jib-extra/opt/java/openjdk
          cp -r custom-jre/. jib-extra/opt/java/openjdk/
          mkdir -p jib-extra/app
          cp otel/opentelemetry-javaagent.jar jib-extra/app/

      - name: Build and push image with Jib
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ./gradlew :app:jib --no-daemon \
            -Djib.to.image="${{ secrets.DOCKERHUB_REGISTRY }}/internhub-v2/dev/news" \
            -Djib.to.tags="latest,sha-${SHORT_SHA},${{ github.ref_name }},${{ github.sha }}" \
            -Djib.to.auth.username="${{ secrets.DOCKERHUB_USERNAME }}" \
            -Djib.to.auth.password="${{ secrets.DOCKERHUB_TOKEN }}"

