server:
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 20000
    accept-count: 30
spring:
  application:
    name: news
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}?currentSchema=${SCHEMA_NAME}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
      connection-timeout: 30000
      idle-timeout: 120000
      max-lifetime: 300000
      keepalive-time: 60000
      leak-detection-threshold: 20000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: ${SCHEMA_NAME}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  web:
    resources:
      add-mappings: false
  feign:
    client:
      config:
        hrm:
          url: ${TICKET_SERVICE_URL:http://localhost:8081}
        ticket-service:
          url: ${TICKET_SERVICE_URL:http://localhost:8081}
management:
  opentelemetry:
    resource-attributes:
      "service.name": ${spring.application.name}
      "service.version": "1.0.5"
      "deployment.environment": ${DEPLOY_ENV:dev}
  logging:
    export:
      otlp:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false

security:
  internal-secret: ${INTERNAL_SECRET_KEY:defaultSecretValue}
  internal-path-prefix: /news/internal
  excluded-paths:
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html

services:
  gateway:
    url: ${GATEWAY_URL:http://localhost:8765}

ticket:
  service:
    internal-url: ${TICKET_SERVICE_INTERNAL_URL:http://localhost:8081}

news:
  ticket-type-id: ${NEWS_TICKET_TYPE_ID:5}
  kafka:
    ticket-events-enabled: ${NEWS_TICKET_EVENTS_ENABLED:true}
    ticket-events-topic: ${NEWS_TICKET_EVENTS_TOPIC:ih.ticket.events}
    ticket-events-group: ${NEWS_TICKET_EVENTS_GROUP:${spring.application.name}-ticket-events}

audit:
  topic: ih-audit-topic

common:
  logging:
    enabled: ${COMMON_LOGGING_ENABLED:true}
    request: ${COMMON_LOGGING_REQUEST:true}
    response: ${COMMON_LOGGING_RESPONSE:true}
    header: ${COMMON_LOGGING_HEADER:true}
    mask-headers:
      - authorization
      - cookie
      - set-cookie
      - x-api-key
      - x-internal-secret
    mask-fields:
      - password
      - body
    exclude-paths:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
