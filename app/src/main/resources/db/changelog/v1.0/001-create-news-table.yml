databaseChangeLog:
  - changeSet:
      id: 001-create-news-table
      author: internhub
      changes:
        - createTable:
            tableName: news
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_news_status
                    references: news_status(id)
              - column:
                  name: topic_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_news_topic
                    references: news_topics(id)
              - column:
                  name: created_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: thumbnail
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: is_featured
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: updated_by
                  type: BIGINT
                  constraints:
                    nullable: true
