databaseChangeLog:
  - changeSet:
      id: 001-create-news-topics-table
      author: internhub
      changes:
        - createTable:
            tableName: news_topics
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
